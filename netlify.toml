# Netlify deployment config for the lokoLM docs (Next.js static export).
# Set this repository's "base directory" to the repo root on Netlify (or to the
# folder containing this file). The static export goes to `out/`.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  # Points the Contribute Data upload page at the live API instead of localhost.
  # NEXT_PUBLIC_ vars are inlined at build time, so a redeploy is required to apply.
  NEXT_PUBLIC_INTAKE_API_URL = "https://api.larnova.co"
